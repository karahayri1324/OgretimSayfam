version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ogretimsayfam-db
    environment:
      POSTGRES_DB: ogretimsayfam
      POSTGRES_USER: ogretimsayfam
      POSTGRES_PASSWORD: ogretimsayfam_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ogretimsayfam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
